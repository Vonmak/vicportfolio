name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --ci
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: false  # CRA treats warnings as errors when CI=true; keep false for now
          REACT_APP_GITHUB_USERNAME: Vonmak
